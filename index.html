<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>West Essex Wednesday and Saturday 9:00am Rollup</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f4f0;color:#1a1a1a;min-height:100vh}
.app{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
.inner{min-width:360px;max-width:860px;margin:0 auto;padding:14px 14px 28px}
.hero{background:#1a5c2a;border-radius:12px;padding:18px 20px 14px;margin-bottom:14px;text-align:center}
.hero-ico{font-size:28px;margin-bottom:4px}
.hero-title{color:#fff;font-size:18px;font-weight:500;line-height:1.3}
.hero-sub{color:rgba(255,255,255,.65);font-size:12px;margin-top:4px}
.tabs{display:flex;gap:8px;margin-bottom:12px}
.tab{flex:1;padding:10px 12px;border-radius:8px;border:1px solid #b0c4b1;background:#e8ede8;color:#555;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s,color .15s}
.tab.on{background:#1a5c2a;color:#fff;border-color:#1a5c2a}
.tab:hover:not(.on){background:#fff;color:#1a1a1a}
.vbadge{display:inline-block;font-size:11px;font-weight:500;padding:2px 10px;border-radius:20px;margin-bottom:10px}
.vbadge.wed{background:rgba(245,158,11,.15);color:#92400e;border:1px solid rgba(245,158,11,.35)}
.vbadge.sat{background:rgba(109,40,217,.12);color:#5b21b6;border:1px solid rgba(109,40,217,.3)}
.card{background:#fff;border:1px solid #dde4dd;border-radius:12px;padding:14px;margin-bottom:12px}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-label{font-size:12px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:.5px}
.cbadge{font-size:11px;background:#e8f5e9;color:#1a5c2a;padding:2px 8px;border-radius:20px;font-weight:500}
.scroll-hint{font-size:11px;color:#aaa;text-align:center;margin-bottom:8px;display:none}
.col-heads{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr) 80px 30px;gap:5px;padding-bottom:5px;border-bottom:1px solid #eee;margin-bottom:2px}
.ch{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.4px}
.row{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr) 80px 30px;gap:5px;align-items:center;padding:5px 0;border-bottom:1px solid #f5f5f5}
.row:last-child{border-bottom:none}
.row input[type=text]{padding:6px 9px;font-size:13px;border-radius:7px;border:1px solid #ddd;background:#f9f9f9;color:#1a1a1a;width:100%;min-width:0}
.row input[type=text]:focus{outline:none;border-color:#1a5c2a;background:#fff}
.row select{padding:6px 5px;font-size:12px;border-radius:7px;border:1px solid #ddd;background:#f9f9f9;color:#1a1a1a;width:100%;cursor:pointer}
.row select:focus{outline:none;border-color:#1a5c2a}
.delbtn{width:27px;height:27px;border-radius:50%;border:1px solid #ddd;background:transparent;color:#999;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.delbtn:hover{background:#ffebee;color:#b71c1c;border-color:#ef9a9a}
.acts{display:flex;gap:7px;margin-top:11px;flex-wrap:wrap;align-items:center}
.btn-add{padding:8px 15px;border-radius:8px;border:1px solid #1a5c2a;background:transparent;color:#1a5c2a;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px}
.btn-add:hover{background:#e8f5e9}
.btn-clear{padding:8px 15px;border-radius:8px;border:1px solid #ccc;background:transparent;color:#666;font-size:13px;cursor:pointer}
.btn-clear:hover{background:#ffebee;color:#b71c1c;border-color:#ef9a9a}
.btn-gen{margin-left:auto;padding:8px 18px;border-radius:8px;border:none;background:#1a5c2a;color:#fff;font-size:14px;font-weight:500;cursor:pointer}
.btn-gen:hover{background:#144a21}
.btn-gen:disabled{background:#ccc;color:#888;cursor:default}
.info{font-size:11px;color:#aaa;margin-top:8px;line-height:1.5}
.empty{text-align:center;padding:28px 12px;color:#bbb;font-size:14px}
.ghead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.gtitle{font-size:15px;font-weight:500;color:#1a1a1a}
.btn-sha{padding:6px 13px;border-radius:8px;border:1px solid #25D366;background:transparent;color:#128C7E;font-size:12px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:5px;text-decoration:none}
.btn-sha:hover{background:#e8f5e9}
.gcard{background:#f7f9f7;border:1px solid #e0e8e0;border-radius:8px;padding:11px 13px;margin-bottom:8px}
.gcard.gfirst{border-left:3px solid #f59e0b;border-radius:0 8px 8px 0}
.gcard.glast{border-left:3px solid #7c3aed;border-radius:0 8px 8px 0}
.gcard.greg{border-left:3px solid #1a5c2a;border-radius:0 8px 8px 0}
.gcardhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.glabel{font-size:13px;font-weight:500;color:#555}
.gsz{font-size:11px;padding:2px 7px;border-radius:20px;font-weight:500}
.gsz3{background:#e8f5e9;color:#1a5c2a}
.gsz4{background:#e3f2fd;color:#0d47a1}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.chip{background:#fff;border:1px solid #ddd;border-radius:20px;padding:3px 11px;font-size:13px;color:#1a1a1a}
.btn-wa{padding:5px 11px;border-radius:7px;border:1px solid #25D366;background:transparent;color:#128C7E;font-size:12px;cursor:pointer;font-weight:500;display:inline-flex;align-items:center;gap:4px;text-decoration:none}
.btn-wa:hover{background:#e8f5e9}
@media(max-width:480px){
  .inner{padding:10px 10px 20px}
  .col-heads{grid-template-columns:minmax(0,1fr) minmax(0,1fr) 70px 28px}
  .row{grid-template-columns:minmax(0,1fr) minmax(0,1fr) 70px 28px}
  .scroll-hint{display:block}
}
</style>
</head>
<body>

<div class="app">
<div class="inner">

<div class="hero">
  <div class="hero-ico">⛳</div>
  <div class="hero-title">West Essex Wednesday and Saturday 9:00am Rollup</div>
  <div class="hero-sub">Group generator &amp; manager</div>
</div>

<div class="scroll-hint">Swipe left or right if the table is cut off</div>

<div class="tabs">
  <button class="tab on" id="tab-wed" onclick="switchVar('wed')">Wednesday Roll Up</button>
  <button class="tab" id="tab-sat" onclick="switchVar('sat')">Saturday Roll Up</button>
</div>

<div id="vbadge-wrap"><span class="vbadge wed" id="vbadge">Wednesday Roll Up</span></div>

<div class="card">
  <div class="card-head">
    <span class="card-label">Players</span>
    <span class="cbadge" id="cnt">0 / 20</span>
  </div>
  <div class="col-heads">
    <span class="ch">Name</span>
    <span class="ch">Designated partner</span>
    <span class="ch">Group pref</span>
    <span class="ch"></span>
  </div>
  <div id="plist"></div>
  <div class="acts">
    <button class="btn-add" onclick="addRow()"><span style="font-size:15px">+</span> Add player</button>
    <button class="btn-clear" onclick="clearAll()">Clear all</button>
    <button class="btn-gen" id="genbtn" onclick="generate()" disabled>⛳ Generate groups</button>
  </div>
  <div class="info">Groups of 3 displayed before groups of 4. Partners always in the same group. First/Last preferences honoured.</div>
</div>

<div id="gout"></div>

</div>
</div>

<script>
const S={wed:[],sat:[],cur:'wed'};
const cur=()=>S[S.cur];

function addRow(n,p,g){
  n=n||'';p=p||'';g=g||'';
  if(cur().length>=20)return;
  cur().push({n,p,g});
  render();
}

function delRow(i){cur().splice(i,1);render();}
function upd(i,f,v){cur()[i][f]=v;}

function clearAll(){
  if(!confirm('Clear all players for this variation?'))return;
  S[S.cur]=[];
  document.getElementById('gout').innerHTML='';
  render();
}

function switchVar(v){
  S.cur=v;
  document.getElementById('tab-wed').classList.toggle('on',v==='wed');
  document.getElementById('tab-sat').classList.toggle('on',v==='sat');
  const b=document.getElementById('vbadge');
  b.textContent=v==='wed'?'Wednesday Roll Up':'Saturday Roll Up';
  b.className='vbadge '+(v==='wed'?'wed':'sat');
  document.getElementById('gout').innerHTML='';
  render();
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function render(){
  const list=cur();
  document.getElementById('cnt').textContent=list.length+' / 20';
  document.getElementById('genbtn').disabled=list.length<2;
  const el=document.getElementById('plist');
  if(!list.length){el.innerHTML='<div class="empty">No players yet — tap Add player to begin</div>';return;}
  el.innerHTML=list.map((r,i)=>`
    <div class="row">
      <input type="text" placeholder="Player name" value="${esc(r.n)}" oninput="upd(${i},'n',this.value)">
      <input type="text" placeholder="Optional" value="${esc(r.p)}" oninput="upd(${i},'p',this.value)">
      <select onchange="upd(${i},'g',this.value)">
        <option value="" ${!r.g?'selected':''}>—</option>
        <option value="First" ${r.g==='First'?'selected':''}>First</option>
        <option value="Last" ${r.g==='Last'?'selected':''}>Last</option>
      </select>
      <button class="delbtn" onclick="delRow(${i})">×</button>
    </div>`).join('');
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function generate(){
  const players=cur().map(r=>({...r})).filter(r=>r.n.trim());
  if(players.length<2){alert('Add at least 2 players first.');return;}
  const n=players.length;
  const numG=Math.ceil(n/3.5);
  const num3=numG*4-n;
  const num4=numG-num3;
  const tempSizes=Array(num3).fill(3).concat(Array(num4).fill(4));

  const firstP=players.filter(p=>p.g==='First');
  const lastP=players.filter(p=>p.g==='Last');
  const others=shuffle(players.filter(p=>p.g!=='First'&&p.g!=='Last'));

  const placed=new Set();
  const rawGroups=[];
  for(let i=0;i<numG;i++) rawGroups.push([]);

  const firstIdx=0;
  const lastIdx=numG-1;

  function place(player,gIdx){
    if(placed.has(player.n))return;
    rawGroups[gIdx].push(player.n);
    placed.add(player.n);
    if(player.p&&player.p.trim()){
      const partner=players.find(x=>x.n.toLowerCase()===player.p.trim().toLowerCase());
      if(partner&&!placed.has(partner.n)){
        rawGroups[gIdx].push(partner.n);
        placed.add(partner.n);
      }
    }
  }

  firstP.forEach(p=>place(p,firstIdx));
  lastP.forEach(p=>place(p,lastIdx));

  let gi=0;
  for(const p of others){
    if(placed.has(p.n))continue;
    while(gi<numG&&rawGroups[gi].length>=(tempSizes[gi]||4)) gi++;
    if(gi>=numG) gi=numG-1;
    place(p,gi);
  }
  players.forEach(p=>{
    if(!placed.has(p.n)){
      let min=0;
      for(let i=1;i<numG;i++) if(rawGroups[i].length<rawGroups[min].length) min=i;
      rawGroups[min].push(p.n);
      placed.add(p.n);
    }
  });

  let finalGroups;
  if(numG===1){
    finalGroups=rawGroups;
  } else {
    const firstGroup=rawGroups[0];
    const lastGroup=rawGroups[numG-1];
    const middle=rawGroups.slice(1,numG-1);
    const mid3=middle.filter(g=>g.length<=3);
    const mid4=middle.filter(g=>g.length>=4);
    finalGroups=[firstGroup,...mid3,...mid4,lastGroup];
  }

  showGroups(finalGroups);
}

const waIcon=`<svg width="13" height="13" viewBox="0 0 24 24" fill="#128C7E"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`;

function showGroups(groups){
  const variation=S.cur==='wed'?'Wednesday Roll Up':'Saturday Roll Up';
  const last=groups.length-1;
  const allLines=groups.map((g,i)=>`Group ${i+1}: ${g.join(', ')}`).join('\n');
  const allUrl='https://wa.me/?text='+encodeURIComponent(variation+'\n'+allLines);

  let html=`<div class="card">
    <div class="ghead">
      <span class="gtitle">${variation} — Groups</span>
      <a class="btn-sha" href="${allUrl}" target="_blank">${waIcon} Share all</a>
    </div>`;

  groups.forEach((g,i)=>{
    let cls='greg',lbl=`Group ${i+1}`;
    if(i===0&&groups.length>1){cls='gfirst';lbl='Group 1 — First tee';}
    if(i===last&&groups.length>1){cls='glast';lbl=`Group ${i+1} — Last tee`;}
    const szCls=g.length<=3?'gsz3':'gsz4';
    const chips=g.map(n=>`<span class="chip">${esc(n)}</span>`).join('');
    const wUrl='https://wa.me/?text='+encodeURIComponent(`${variation} - Group ${i+1}: ${g.join(', ')}`);
    html+=`<div class="gcard ${cls}">
      <div class="gcardhead">
        <span class="glabel">${lbl}</span>
        <span class="gsz ${szCls}">${g.length} players</span>
      </div>
      <div class="chips">${chips}</div>
      <a class="btn-wa" href="${wUrl}" target="_blank">${waIcon} Share on WhatsApp</a>
    </div>`;
  });
  html+='</div>';
  document.getElementById('gout').innerHTML=html;
}

render();
</script>
</body>
</html>
